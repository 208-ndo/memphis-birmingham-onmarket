name: Market Audit

on:
  workflow_dispatch:
    inputs:
      markets:
        description: 'Space-separated market keys'
        required: false
        default: 'huntsville little_rock oklahoma_city'
      price_reduced:
        description: 'Include price-reduced filter variant (true/false)'
        required: false
        default: 'true'
      dry:
        description: 'Dry run only - no Apify calls (true/false)'
        required: false
        default: 'false'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile audit script
        run: python -m py_compile scripts/market_audit.py && echo "COMPILE PASS"

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run audit dry
        if: github.event.inputs.dry == 'true'
        run: |
          python scripts/market_audit.py \
            --dry \
            --markets ${{ github.event.inputs.markets }} \
            --output-dir reports/

      - name: Run audit live with price-reduced
        if: github.event.inputs.dry != 'true' && github.event.inputs.price_reduced == 'true'
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          python scripts/market_audit.py \
            --markets ${{ github.event.inputs.markets }} \
            --price-reduced \
            --output-dir reports/

      - name: Run audit live without price-reduced
        if: github.event.inputs.dry != 'true' && github.event.inputs.price_reduced != 'true'
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          python scripts/market_audit.py \
            --markets ${{ github.event.inputs.markets }} \
            --output-dir reports/

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-audit-reports
          path: reports/
          retention-days: 30
