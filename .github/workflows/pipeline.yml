name: Memphis Birmingham On-Market Pipeline

on:
  schedule:
    # Tuesday
    - cron: '0 14 * * 2'
    - cron: '0 17 * * 2'
    - cron: '0 20 * * 2'
    # Wednesday
    - cron: '0 14 * * 3'
    - cron: '0 17 * * 3'
    - cron: '0 20 * * 3'
    # Thursday
    - cron: '0 14 * * 4'
    - cron: '0 17 * * 4'
    - cron: '0 20 * * 4'
    # Friday
    - cron: '0 14 * * 5'
    - cron: '0 17 * * 5'
    - cron: '0 20 * * 5'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — scrape + generate but NO emails sent'
        required: false
        default: 'false'
      force_run:
        description: 'Force run on any day (bypass day gate)'
        required: false
        default: 'true'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GMAIL_USER_MEMPHIS: ${{ secrets.GMAIL_USER_MEMPHIS }}
          GMAIL_APP_PASSWORD_MEMPHIS: ${{ secrets.GMAIL_APP_PASSWORD_MEMPHIS }}
          GMAIL_USER_BIRMINGHAM: ${{ secrets.GMAIL_USER_BIRMINGHAM }}
          GMAIL_APP_PASSWORD_BIRMINGHAM: ${{ secrets.GMAIL_APP_PASSWORD_BIRMINGHAM }}
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          GHL_PHONE_MEMPHIS: ${{ secrets.GHL_PHONE_MEMPHIS }}
          GHL_PHONE_BIRMINGHAM: ${{ secrets.GHL_PHONE_BIRMINGHAM }}
        run: |
          # ── Normalize dry_run input ──────────────────────────────────────
          DRY_RUN_RAW="${{ github.event.inputs.dry_run }}"
          DRY_RUN_NORMALIZED="$(echo "$DRY_RUN_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
          echo "dry_run  raw='${DRY_RUN_RAW}'  normalized='${DRY_RUN_NORMALIZED}'"

          # ── Normalize force_run input ────────────────────────────────────
          FORCE_RUN_RAW="${{ github.event.inputs.force_run }}"
          FORCE_RUN_NORMALIZED="$(echo "$FORCE_RUN_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
          echo "force_run  raw='${FORCE_RUN_RAW}'  normalized='${FORCE_RUN_NORMALIZED}'"

          # ── Build flags from normalized values only ──────────────────────
          FLAGS=""
          if [ "${DRY_RUN_NORMALIZED}" = "true" ]; then
            FLAGS="${FLAGS} --dry-run"
            echo "Mode: DRY RUN — no emails will be sent, no GHL contacts created"
          else
            echo "Mode: LIVE — emails and GHL pushes enabled"
          fi

          if [ "${FORCE_RUN_NORMALIZED}" = "true" ]; then
            FLAGS="${FLAGS} --force"
            echo "Force: ON — bypassing day-of-week gate"
          fi

          # ── Export FORCE_RUN for main.py env check ───────────────────────
          export FORCE_RUN="${FORCE_RUN_NORMALIZED}"

          echo "Running: python main.py${FLAGS}"
          python main.py${FLAGS}

      - name: Commit dashboard data to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "Pipeline run $(date +'%Y-%m-%d %H:%M') — auto update"
          git push || true

      - name: Upload pipeline log artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-log-${{ github.run_id }}
          path: data/pipeline.log
          retention-days: 30
