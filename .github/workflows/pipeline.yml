name: Memphis Birmingham On-Market Pipeline

on:
  schedule:
    # Tuesday
    - cron: '0 14 * * 2'
    - cron: '0 17 * * 2'
    - cron: '0 20 * * 2'
    # Wednesday
    - cron: '0 14 * * 3'
    - cron: '0 17 * * 3'
    - cron: '0 20 * * 3'
    # Thursday
    - cron: '0 14 * * 4'
    - cron: '0 17 * * 4'
    - cron: '0 20 * * 4'
    # Friday
    - cron: '0 14 * * 5'
    - cron: '0 17 * * 5'
    - cron: '0 20 * * 5'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — scrape + generate but NO emails sent'
        required: false
        default: 'true'
      force_run:
        description: 'Force run on any day (bypass day gate)'
        required: false
        default: 'true'
      target_markets:
        description: 'Optional comma-separated market keys, example: cleveland,akron'
        required: false
        type: string
        default: ''
      apify_enabled:
        description: 'Enable Apify scraping (set false for no-scrape compile/logic test)'
        required: false
        default: 'false'
      email_enrichment_enabled:
        description: 'Enable Google email enrichment actor (set false to scrape Zillow only)'
        required: false
        default: 'false'
      max_email_enrichment_calls:
        description: 'Override MAX_EMAIL_ENRICHMENT_CALLS_PER_WORKFLOW (blank = use config.py default of 5)'
        required: false
        default: ''
      max_leads_to_enrich:
        description: 'Override MAX_LEADS_TO_ENRICH_PER_WORKFLOW (blank = use config.py default of 10)'
        required: false
        default: ''
      clear_overflow_before_run:
        description: 'Ignore data/overflow.json for this run only (clean dry-run testing). Does NOT delete the file. Default false = normal production behavior.'
        required: false
        default: 'false'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GMAIL_USER_MEMPHIS: ${{ secrets.GMAIL_USER_MEMPHIS }}
          GMAIL_APP_PASSWORD_MEMPHIS: ${{ secrets.GMAIL_APP_PASSWORD_MEMPHIS }}
          GMAIL_USER_BIRMINGHAM: ${{ secrets.GMAIL_USER_BIRMINGHAM }}
          GMAIL_APP_PASSWORD_BIRMINGHAM: ${{ secrets.GMAIL_APP_PASSWORD_BIRMINGHAM }}
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          GHL_PHONE_MEMPHIS: ${{ secrets.GHL_PHONE_MEMPHIS }}
          GHL_PHONE_BIRMINGHAM: ${{ secrets.GHL_PHONE_BIRMINGHAM }}
        run: |
          # ── Normalize dry_run input ──────────────────────────────────────
          DRY_RUN_RAW="${{ github.event.inputs.dry_run }}"
          DRY_RUN_NORMALIZED="$(echo "$DRY_RUN_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
          echo "dry_run  raw='${DRY_RUN_RAW}'  normalized='${DRY_RUN_NORMALIZED}'"

          # ── Normalize force_run input ────────────────────────────────────
          FORCE_RUN_RAW="${{ github.event.inputs.force_run }}"
          FORCE_RUN_NORMALIZED="$(echo "$FORCE_RUN_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
          echo "force_run  raw='${FORCE_RUN_RAW}'  normalized='${FORCE_RUN_NORMALIZED}'"

          # ── Normalize apify_enabled input ────────────────────────────────
          # Scheduled runs always inherit APIFY_ENABLED=true (normal operation).
          # Manual dispatch can pass apify_enabled=false for a no-scrape test
          # that validates compile/import/email/offer logic at zero Apify cost.
          APIFY_ENABLED_RAW="${{ github.event.inputs.apify_enabled }}"
          # Default to true if input is blank (scheduled run or unset dispatch)
          if [ -z "${APIFY_ENABLED_RAW}" ]; then
            APIFY_ENABLED_NORMALIZED="true"
          else
            APIFY_ENABLED_NORMALIZED="$(echo "$APIFY_ENABLED_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
          fi
          echo "apify_enabled  raw='${APIFY_ENABLED_RAW}'  normalized='${APIFY_ENABLED_NORMALIZED}'"

          # Trim target_markets as a literal comma-separated string. Do not boolean-normalize it.
          TARGET_MARKETS_RAW="${{ github.event.inputs.target_markets }}"
          TARGET_MARKETS_TRIMMED="$(echo "$TARGET_MARKETS_RAW" | xargs)"
          echo "target_markets raw='${TARGET_MARKETS_RAW}' trimmed='${TARGET_MARKETS_TRIMMED}'"

          # ── Normalize email_enrichment_enabled input ─────────────────────
          # Controls the Google email-search Apify actor only (separate from
          # the Zillow scraper). Set false to scrape Zillow but skip Google
          # email lookups — leads keep agent_email=NONE. Capped further by
          # MAX_EMAIL_ENRICHMENT_CALLS_PER_WORKFLOW in config.py either way.
          EMAIL_ENRICHMENT_ENABLED_RAW="${{ github.event.inputs.email_enrichment_enabled }}"
          if [ -z "${EMAIL_ENRICHMENT_ENABLED_RAW}" ]; then
            EMAIL_ENRICHMENT_ENABLED_NORMALIZED="true"
          else
            EMAIL_ENRICHMENT_ENABLED_NORMALIZED="$(echo "$EMAIL_ENRICHMENT_ENABLED_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
          fi
          echo "email_enrichment_enabled  raw='${EMAIL_ENRICHMENT_ENABLED_RAW}'  normalized='${EMAIL_ENRICHMENT_ENABLED_NORMALIZED}'"

          # ── Normalize clear_overflow_before_run input ────────────────────
          # Default false — production behavior unchanged. Set true only for
          # clean dry-run testing so data/overflow.json from prior test runs
          # doesn't contaminate this run's fresh-lead measurements. Does not
          # delete or modify the committed file.
          CLEAR_OVERFLOW_RAW="${{ github.event.inputs.clear_overflow_before_run }}"
          if [ -z "${CLEAR_OVERFLOW_RAW}" ]; then
            CLEAR_OVERFLOW_NORMALIZED="false"
          else
            CLEAR_OVERFLOW_NORMALIZED="$(echo "$CLEAR_OVERFLOW_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
          fi
          echo "clear_overflow_before_run  raw='${CLEAR_OVERFLOW_RAW}'  normalized='${CLEAR_OVERFLOW_NORMALIZED}'"

          # ── Live-send kill switch ────────────────────────────────────────
          # Scheduled runs (cron) never live-send unless LIVE_SEND_ENABLED secret = "true".
          # Manual dispatch can live-send only if dry_run != "true" AND LIVE_SEND_ENABLED = "true".
          LIVE_SEND_ENABLED="${{ secrets.LIVE_SEND_ENABLED }}"
          LIVE_SEND_NORMALIZED="$(echo "$LIVE_SEND_ENABLED" | tr '[:upper:]' '[:lower:]' | xargs)"
          echo "live_send_enabled normalized='${LIVE_SEND_NORMALIZED}'"

          # ── Pre-run Apify budget summary ─────────────────────────────────
          echo "========================================"
          echo "APIFY BUDGET SUMMARY"
          echo "  APIFY_ENABLED                       : ${APIFY_ENABLED_NORMALIZED}"
          echo "  EMAIL_ENRICHMENT_ENABLED            : ${EMAIL_ENRICHMENT_ENABLED_NORMALIZED}"
          if [ -n "${TARGET_MARKETS_TRIMMED}" ]; then
            SELECTED_MARKETS="$(echo "${TARGET_MARKETS_TRIMMED}" | tr ',' ' ' | xargs)"
          else
            SELECTED_MARKETS="little_rock oklahoma_city"
          fi
          SELECTED_MARKET_COUNT=$(echo "${SELECTED_MARKETS}" | wc -w | xargs)
          PLANNED_ZILLOW_CALLS=$((4 * SELECTED_MARKET_COUNT))
          echo "  TARGET_MARKETS                      : ${TARGET_MARKETS_TRIMMED:-ACTIVE_MARKETS}"
          echo "  Selected markets                    : ${SELECTED_MARKETS}"
          echo "  MAX_APIFY_RUNS_PER_WORKFLOW         : 10 (config.py — shared, covers Zillow + Google + any future actor)"
          echo "  MAX_EMAIL_ENRICHMENT_CALLS_PER_WORKFLOW: 5 default (config.py — Google sub-cap; override='${{ github.event.inputs.max_email_enrichment_calls }}')"
          echo "  MAX_LEADS_TO_ENRICH_PER_WORKFLOW    : 10 default (config.py — top-scored shortlist before enrichment; override='${{ github.event.inputs.max_leads_to_enrich }}')"
          echo "  Price bands per market                : 4 max; market config may cap final band"
          echo "  Planned Zillow calls                  : ${PLANNED_ZILLOW_CALLS} (4 bands x ${SELECTED_MARKET_COUNT} selected market(s), max estimate)"
          echo "  Planned max Google email calls        : up to $((5 * SELECTED_MARKET_COUNT)) (5 cap x ${SELECTED_MARKET_COUNT} market(s)) IF email_enrichment_enabled=true"
          echo "                                           — only for the TOP-SCORED leads per market, never every lead"
          echo "  If APIFY_ENABLED=false                : 0 Apify calls (no-scrape test mode)"
          echo "  If EMAIL_ENRICHMENT_ENABLED=false      : 0 Google calls (Zillow-only test mode, leads show Email: NONE)"
          echo "  Actual calls are hard-capped at runtime by scraper.py's shared budget counter"
          echo "  CLEAR_OVERFLOW_BEFORE_RUN           : ${CLEAR_OVERFLOW_NORMALIZED} (true = ignore data/overflow.json this run only, file untouched)"
          echo "========================================"

          # ── Build flags from normalized values only ──────────────────────
          FLAGS=""
          if [ "${DRY_RUN_NORMALIZED}" = "true" ]; then
            FLAGS="${FLAGS} --dry-run"
            echo "Mode: DRY RUN — no emails will be sent, no GHL contacts created"
          elif [ "${LIVE_SEND_NORMALIZED}" != "true" ]; then
            FLAGS="${FLAGS} --dry-run"
            echo "Mode: LIVE SEND DISABLED — LIVE_SEND_ENABLED secret not set to true"
            echo "LIVE SEND DISABLED — forcing dry run. Set LIVE_SEND_ENABLED secret to 'true' to enable."
          else
            echo "Mode: LIVE — emails and GHL pushes enabled"
          fi

          if [ "${FORCE_RUN_NORMALIZED}" = "true" ]; then
            FLAGS="${FLAGS} --force"
            echo "Force: ON — bypassing day-of-week gate"
          fi

          # ── Export env vars for main.py / scraper.py / config.py ─────────
          export FORCE_RUN="${FORCE_RUN_NORMALIZED}"
          export APIFY_ENABLED="${APIFY_ENABLED_NORMALIZED}"
          export EMAIL_ENRICHMENT_ENABLED="${EMAIL_ENRICHMENT_ENABLED_NORMALIZED}"
          export TARGET_MARKETS="${TARGET_MARKETS_TRIMMED}"
          export MAX_EMAIL_ENRICHMENT_CALLS_OVERRIDE="${{ github.event.inputs.max_email_enrichment_calls }}"
          export MAX_LEADS_TO_ENRICH_OVERRIDE="${{ github.event.inputs.max_leads_to_enrich }}"
          export CLEAR_OVERFLOW_BEFORE_RUN="${CLEAR_OVERFLOW_NORMALIZED}"

          echo "Running: python main.py${FLAGS}"
          python main.py${FLAGS}

      - name: Commit dashboard data to repo
        if: always() && github.event.inputs.apify_enabled != 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "Pipeline run $(date +'%Y-%m-%d %H:%M') — auto update"
          git push || true

      - name: Upload pipeline log artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-log-${{ github.run_id }}
          path: data/pipeline.log
          retention-days: 30
